name: Backend Deploy to ECS

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "Dockerfile"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
  ECR_BACKEND: ${{ secrets.ECR_BACKEND_REPO }}
  ECR_WORKER: ${{ secrets.ECR_WORKER_REPO }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_BACKEND_SERVICE: ${{ secrets.ECS_BACKEND_SERVICE }}
  ECS_WORKER_SERVICE: ${{ secrets.ECS_WORKER_SERVICE }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # Checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # Install Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Install Lint Tool
      - name: Install flake8
        run: pip install flake8

      # Run Lint
      - name: Run Lint
        run: flake8 backend/ --max-line-length=120

      # Install dependencies
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # Run Tests (basic placeholder)
      - name: Run Tests
        run: |
          echo "No tests yet"
          exit 0
          
      # AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Login to ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      # Build Backend Image
      - name: Build Backend Image
        run: |
          docker build -t backend .

      # Build ADOT Image
      - name: Build ADOT Image
        run: |
          docker build -t adot ./adot

      # Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      # Scan Image
      - name: Run Trivy Scan
        run: |
          trivy image backend --exit-code 0 --severity CRITICAL

      # Tag & Push Backend
      - name: Push Backend Image
        run: |
          docker tag backend:latest \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_BACKEND:latest

          docker push \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_BACKEND:latest

      # Push ADOT Image
      - name: Push ADOT Image
        run: |
          docker tag adot:latest \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/devops-adot:latest

          docker push \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/devops-adot:latest

      # Tag & Push Worker
      - name: Push Worker Image
        run: |
          docker tag backend:latest \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_WORKER:latest

          docker push \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_WORKER:latest

      # Deploy Backend Service
      - name: Deploy Backend Service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_BACKEND_SERVICE \
            --force-new-deployment

      # Deploy Worker Service
      - name: Deploy Worker Service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_WORKER_SERVICE \
            --force-new-deployment

      # Deploy ADOT Service
      - name: Deploy ADOT Service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service adot-service \
            --force-new-deployment
